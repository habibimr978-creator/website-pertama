<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Raissya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Great+Vibes&family=Poppins:wght@300;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Container Utama */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
        }

        /* HALAMAN 1: TAMPILAN AWAL */
        #page1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(90deg, #ff0055, #ff758c, #ff0055);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        .btn-love {
            margin-top: 30px;
            padding: 15px 40px;
            background: #ff0055;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            transition: 0.3s;
            z-index: 110; /* Pastikan paling depan */
        }

        .btn-love:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff0055;
        }

        /* HALAMAN 2: PESAN RAHASIA (Sembunyi dulu) */
        #page2 {
            display: none; /* Benar-benar hilang di awal */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2b0011 0%, #0a0a0a 100%);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .letter-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 85%;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Animasi Hati */
        .falling-heart {
            position: absolute;
            top: -20px;
            color: #ff0055;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        @keyframes shine { to { background-position: 200% center; } }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="page1">
            <h1>RAISSYA</h1>
            <p style="font-family: 'Great Vibes', cursive; font-size: 2rem; color: #ff758c;">You are my universe</p>
            <button class="btn-love" onclick="bukaSurprise()">CLICK ME ❤️</button>
        </div>

        <div id="page2">
            <div class="letter-card">
                <h2 style="font-family: 'Great Vibes', cursive; font-size: 3rem; color: #ff758c; margin-bottom: 10px;">Dear Raissya,</h2>
                <p style="line-height: 1.6; font-size: 1.1rem;">
                    Makasih ya udah selalu ada buat aku.<br>
                    Kamu selalu bikin hidup aku<br>
                    jadi lebih berwarna dan tertata rapi. :)
                </p>
                <p style="font-weight: bold; font-size: 1.2rem; color: #ff0055;">I Love You! ❤️</p>
                <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; border-radius:20px; padding:5px 15px; cursor:pointer; opacity:0.6;">Ulangi</button>
            </div>
        </div>
    </div>

    <script>
        function bukaSurprise() {
            // Sembunyikan Hal 1 dan Tampilkan Hal 2 secara instan
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'flex';

            // Mulai hujan hati
            setInterval(buatHati, 200);
        }

        function buatHati() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
            heart.style.opacity = Math.random();

            document.getElementById('page2').appendChild(heart);

            // Hapus agar tidak berat
            setTimeout(() => { heart.remove(); }, 4000);
        }
    </script>
</body>
</html>
